<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>%VITE_BROWSER_TITLE%</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-variant": "#262626",

                        "primary-dim": "#eebe00",
                        "on-secondary-fixed-variant": "#006a3b",
                        "inverse-surface": "#fcf9f8",

                        "on-surface": "#ffffff",

                        "on-tertiary": "#622a00",

                        "tertiary": "#ffaa78",
                        "secondary": "#9af6b8",

                        "inverse-primary": "#755c00",
                        "surface-container-low": "#131313",
                        "on-tertiary-container": "#532300",

<style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 118, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            width: 320px;
            height: 320px;
        }
        .pixel {
            width: 16px;
            height: 16px;
        }
        .monitor-glow {
            box-shadow: inset 0 0 40px rgba(255, 221, 124, 0.05), 0 0 20px rgba(0, 0, 0, 1);
        }
        .pixel-art-container {
            image-rendering: pixelated;
        }
        /* Discrete steps for the "game" logic via hidden inputs/labels for pure HTML/CSS interaction or just layout */
        .stage-content { display: none; }
        #stage-1:checked ~ .game-canvas .s1 { display: block; }
        #stage-2:checked ~ .game-canvas .s2 { display: block; }
        #stage-3:checked ~ .game-canvas .s3 { display: block; }
        #stage-4:checked ~ .game-canvas .s4 { display: block; }
        #stage-5:checked ~ .game-canvas .s5 { display: block; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-effect {
            width: 100%;
            height: 100px;
            z-index: 101;
            background: linear-gradient(to bottom, transparent, rgba(255, 221, 124, 0.03), transparent);
            position: absolute;
            animation: scanline 8s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<div class="crt-overlay"></div>
<div class="scanline-effect"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full border-b-0 bg-[#0e0e0e] shadow-[0px_2px_0px_0px_rgba(255,221,124,1)] z-50">
<div class="flex justify-between items-center px-6 py-3 w-full">
<div class="text-xl font-black text-[#ffdd7c] tracking-widest font-['Space_Grotesk'] uppercase tracking-tighter font-bold">
                %VITE_SYSTEM_NAME%
            </div>
<nav class="hidden md:flex space-x-8">
<a class="text-[#9af6b8] font-['Space_Grotesk'] uppercase tracking-tighter font-bold hover:bg-[#ffdd7c] hover:text-[#0e0e0e] px-2 transition-none active:translate-y-0.5" href="#">_SYSTEM</a>
<a class="text-[#ffdd7c] font-['Space_Grotesk'] uppercase tracking-tighter font-bold hover:bg-[#ffdd7c] hover:text-[#0e0e0e] px-2 transition-none active:translate-y-0.5" href="#">_FILES</a>
<a class="text-[#ffdd7c] font-['Space_Grotesk'] uppercase tracking-tighter font-bold hover:bg-[#ffdd7c] hover:text-[#0e0e0e] px-2 transition-none active:translate-y-0.5" href="#">_DIAG</a>
</nav>
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-[#ffdd7c] cursor-pointer hover:bg-[#ffdd7c] hover:text-[#0e0e0e] active:translate-y-0.5">settings</span>
<span class="material-symbols-outlined text-[#ffdd7c] cursor-pointer hover:bg-[#ffdd7c] hover:text-[#0e0e0e] active:translate-y-0.5">help_outline</span>
</div>
</div>
</header>
<!-- Main Content Area: The Terminal -->
<main class="flex-grow flex items-center justify-center p-4 mt-16 mb-16 overflow-hidden">
<div class="relative bg-surface-container-lowest p-1 shadow-[0px_0px_0px_4px_#262626,0px_0px_0px_8px_#ffdd7c] max-w-4xl w-full aspect-video flex flex-col md:flex-row overflow-hidden monitor-glow">
<!-- Sidebar: System Stats -->
<aside class="w-full md:w-64 bg-surface-container border-r-0 md:border-r-4 border-surface-variant p-4 font-body flex flex-col gap-6">
<div>
<div class="text-primary text-[0.6875rem] uppercase mb-1 tracking-widest">_STATUS</div>
<div class="bg-surface-variant p-2 flex items-center gap-2">
<div class="w-3 h-3 bg-secondary animate-pulse"></div>
<span class="text-secondary text-xs uppercase font-bold">System Online</span>
</div>
</div>
<div>
<div class="text-primary text-[0.6875rem] uppercase mb-1 tracking-widest">_HYDRATION_LEVEL</div>
<div class="flex gap-1">
<div class="h-4 w-4 bg-secondary"></div>
<div class="h-4 w-4 bg-secondary"></div>
<div class="h-4 w-4 bg-secondary"></div>
<div class="h-4 w-4 bg-surface-variant"></div>
<div class="h-4 w-4 bg-surface-variant"></div>
<div class="h-4 w-4 bg-surface-variant"></div>
<div class="h-4 w-4 bg-surface-variant"></div>
<div class="h-4 w-4 bg-surface-variant"></div>
</div>
</div>
<div class="mt-auto">
<div class="text-on-surface-variant text-[0.6875rem] uppercase mb-1">_SERIAL: 882-X9</div>
<div class="text-on-surface-variant text-[0.6875rem] uppercase">_LOC: QUADRANT_7</div>
</div>
</aside>
<!-- Main Display: The Pixel Canvas -->
<section class="flex-grow bg-surface-container-lowest relative flex flex-col items-center justify-center p-8">
<!-- Game Canvas Box -->
<div class="relative bg-surface p-4 border-4 border-surface-variant">
<!-- Pixel Art Container (Mocked with SVGs/CSS for stages) -->
<div class="w-64 h-64 bg-surface-container-lowest relative overflow-hidden pixel-art-container">
<!-- Soil (Static) -->
<div class="absolute bottom-0 left-0 w-full h-12 bg-[#5d4037]"></div>
<!-- Stage 1: Seeds -->
<div class="stage-1 absolute bottom-12 left-1/2 -translate-x-1/2 flex gap-4">
<div class="w-2 h-2 bg-[#ffdd7c]"></div>
<div class="w-2 h-2 bg-[#ffdd7c]"></div>
</div>
<!-- Growth Elements (Controlled by simulated stage logic) -->
<!-- This is a CSS-based presentation of the stages -->
<div class="absolute inset-0 pointer-events-none" id="flower-render">
<!-- SVG Art for Stalk/Flower would go here - simplified for this UI shell -->
<svg class="w-full h-full" viewbox="0 0 64 64">
<!-- Stage 2: Stem -->
<rect class="growth-stem" fill="#9af6b8" height="12" width="4" x="30" y="40"></rect>
<!-- Stage 3: Leaves -->
<path d="M26 44 L30 46 L26 48 Z" fill="#006d3d"></path>
<path d="M38 42 L34 44 L38 46 Z" fill="#006d3d"></path>
<!-- Stage 4: Bud -->
<rect fill="#eebe00" height="6" width="8" x="28" y="36"></rect>
<!-- Stage 5: Full Head -->
<circle cx="32" cy="30" fill="#fecb00" r="10"></circle>
<circle cx="32" cy="30" fill="#413200" r="4"></circle>
</svg>
</div>
<!-- Data Overlay -->
<div class="absolute top-2 left-2 text-[0.6rem] text-primary opacity-50 font-mono">
                            X: 232.09<br/>Y: 441.22<br/>T: 24.5C
                        </div>
</div>
</div>
<!-- Instructional Text (Typing Effect Simulation) -->
<div class="mt-8 text-center w-full">
<div class="inline-block bg-surface-variant px-4 py-2 border-l-4 border-primary">
<span class="text-primary font-mono text-sm tracking-widest uppercase">
                            [ CLICK TO WATER ]
                        </span>
</div>
<div class="mt-4 text-on-surface-variant text-xs uppercase tracking-widest">
                        System Ready... Awaiting Input...
                    </div>
</div>
<!-- Action Button -->
<button class="mt-8 px-12 py-4 bg-primary text-on-primary font-black uppercase text-lg hover:bg-primary-dim active:scale-95 transition-none shadow-[4px_4px_0px_0px_rgba(255,255,255,0.2)]">
                    _WATER
                </button>
</section>
</div>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 w-full z-50 bg-[#191a1a] shadow-[0px_-2px_0px_0px_rgba(255,221,124,1)]">
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2">
<button class="flex flex-col items-center justify-center bg-[#262626] text-[#9af6b8] p-2 transition-none active:scale-95 group">
<span class="material-symbols-outlined" data-icon="shutter_speed">shutter_speed</span>
<span class="font-['Space_Grotesk'] text-[0.6875rem] uppercase">_GROW</span>
</button>
<button class="flex flex-col items-center justify-center text-[#ffdd7c] p-2 transition-none active:scale-95 hover:bg-[#ffdd7c] hover:text-[#0e0e0e] group">
<span class="material-symbols-outlined" data-icon="water_drop">water_drop</span>
<span class="font-['Space_Grotesk'] text-[0.6875rem] uppercase">_WATER</span>
</button>
<button class="flex flex-col items-center justify-center text-[#ffdd7c] p-2 transition-none active:scale-95 hover:bg-[#ffdd7c] hover:text-[#0e0e0e] group">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
<span class="font-['Space_Grotesk'] text-[0.6875rem] uppercase">_RESTART</span>
</button>
<button class="flex flex-col items-center justify-center text-[#ffdd7c] p-2 transition-none active:scale-95 hover:bg-[#ffdd7c] hover:text-[#0e0e0e] group">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
<span class="font-['Space_Grotesk'] text-[0.6875rem] uppercase">_LOG</span>
</button>
</div>
</footer>
<!-- Decorative Elements -->
<div class="fixed top-20 right-8 pointer-events-none opacity-20">
<div class="w-32 h-32 border-4 border-dashed border-primary animate-spin" style="animation-duration: 20s;"></div>
</div>
<div class="fixed bottom-24 left-8 pointer-events-none opacity-10">
<div class="text-[8rem] font-black text-primary select-none">SUN</div>
</div>
</body></html>
